# Nginx configuration for the central platform's single public origin (IP-04).
#
# One origin serves both halves of the application:
#
#   /       -> the compiled Angular SPA
#   /api/   -> reverse-proxied to the Backend container
#
# Serving both from one origin is what keeps the browser's requests same-origin, so no CORS policy
# is required on the Backend (it configures none, and this design means it does not need to). The
# Jetson Agent reaches the same origin over the LAN and its activation request is proxied through
# unchanged.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Do not advertise the Nginx version to clients.
    server_tokens off;

    # API reverse proxy.
    #
    # `proxy_pass` here has NO URI path component (just scheme://host:port), which is the form that
    # forwards the original request URI unchanged. So /api/v1/activate arrives at the Backend as
    # /api/v1/activate — the /api prefix is preserved, not stripped. Adding a trailing path (e.g.
    # `proxy_pass http://backend:8080/;`) would strip it and break every route.
    location /api/ {
        proxy_pass http://backend:8080;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # The Backend is an internal service name; never leak it or its redirects to clients.
        proxy_redirect off;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Hashed build assets are immutable (outputHashing: "all"), so they can be cached hard.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html must never be cached, or a browser can pair a stale shell with new hashed assets.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Angular client-side routing: any path that is not a real file is handed to the SPA shell so
    # deep links such as /branches/<id>/edit resolve. This sits AFTER the /api/ block, so API
    # requests are proxied rather than swallowed by the fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
